<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | LeaveFlow</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-root employee-dashboard">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">LF</div>
            <span>Leave<strong>Flow</strong></span>
        </div>
        <nav class="main-menu">
            <p class="menu-label">Menu</p>
            <a href="#apply" class="nav-item active" onclick="showSection('apply')"><i data-lucide="send"></i> Apply Leave</a>
            <a href="#history" class="nav-item" onclick="showSection('history')"><i data-lucide="history"></i> My History</a>
            <a href="#settings" class="nav-item" onclick="showSection('settings')"><i data-lucide="settings"></i> Settings</a>
        </nav>
        <nav class="account-menu">
            <button id="logout-btn" class="nav-item logout"><i data-lucide="log-out"></i> Logout</button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h2 id="welcome-text">Employee Portal</h2>
            <div class="profile-pill">
                <div class="avatar">EP</div>
                <div class="profile-info">
                    <span class="user-email-display">Employee</span>
                    <small>Employee</small>
                </div>
            </div>
        </header>

        <div class="dashboard-scroll-area">
            <!-- Apply Leave Section -->
            <section id="apply" class="dashboard-section">
                <div class="dashboard-grid">
                    <section class="form-container card">
                        <div class="card-header">
                            <h2>New Leave Request</h2>
                        </div>
                        <form id="leave-form">
                            <div class="input-group">
                                <label>Leave Type</label>
                                <select id="leave-type" required>
                                    <option value="Sick">Sick Leave</option>
                                    <option value="Vacation">Vacation</option>
                                    <option value="Personal">Personal</option>
                                    <option value="Casual">Casual Leave</option>
                                    <option value="Maternity">Maternity</option>
                                    <option value="Paternity">Paternity</option>
                                </select>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>Start Date</label>
                                    <input type="date" id="start-date" required>
                                </div>
                                <div class="input-group">
                                    <label>End Date</label>
                                    <input type="date" id="end-date" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Reason</label>
                                <textarea id="reason" placeholder="Briefly explain your request..." required></textarea>
                            </div>
                            <button type="submit" class="btn-primary">Submit Application</button>
                        </form>
                    </section>

                    <section class="card">
                        <div class="card-header">
                            <h2>Leave Balance</h2>
                        </div>
                        <div style="padding: 20px;">
                            <div style="margin-bottom: 20px;">
                                <p style="color: var(--text-secondary); margin-bottom: 5px;">Sick Leave</p>
                                <div style="background: rgba(59, 130, 246, 0.2); height: 8px; border-radius: 4px;">
                                    <div style="background: var(--accent-blue); height: 100%; width: 75%; border-radius: 4px;"></div>
                                </div>
                                <small style="color: var(--text-secondary);">9 / 12 days used</small>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <p style="color: var(--text-secondary); margin-bottom: 5px;">Vacation</p>
                                <div style="background: rgba(139, 92, 246, 0.2); height: 8px; border-radius: 4px;">
                                    <div style="background: var(--accent-purple); height: 100%; width: 50%; border-radius: 4px;"></div>
                                </div>
                                <small style="color: var(--text-secondary);">15 / 20 days used</small>
                            </div>
                            <div>
                                <p style="color: var(--text-secondary); margin-bottom: 5px;">Personal</p>
                                <div style="background: rgba(245, 158, 11, 0.2); height: 8px; border-radius: 4px;">
                                    <div style="background: #f59e0b; height: 100%; width: 33%; border-radius: 4px;"></div>
                                </div>
                                <small style="color: var(--text-secondary);">5 / 6 days used</small>
                            </div>
                        </div>
                    </section>
                </div>
            </section>

            <!-- History Section -->
            <section id="history" class="dashboard-section" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h2>My Leave Requests</h2>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Type</th>
                                    <th>Dates</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="my-requests">
                                <tr><td colspan="4" style="text-align: center; padding: 20px;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Settings Section -->
            <section id="settings" class="dashboard-section" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h2>Settings</h2>
                    </div>
                    <form id="settings-form" style="max-width: 500px;">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="full-name" placeholder="Your full name">
                        </div>
                        <div class="input-group">
                            <label>Phone</label>
                            <input type="tel" id="phone" placeholder="Your phone number">
                        </div>
                        <div class="input-group">
                            <label>Department</label>
                            <input type="text" id="department" placeholder="Your department">
                        </div>
                        <button type="submit" class="btn-primary">Save Settings</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script src="dashboard.js"></script>
    <script>
        lucide.createIcons();

        function showSection(sectionId) {
            document.querySelectorAll('.dashboard-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.nav-item').classList.add('active');
        }

        // Settings form handler
        const settingsForm = document.getElementById('settings-form');
        if (settingsForm) {
            settingsForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const user = JSON.parse(localStorage.getItem('leaveflow_user'));
                saveSettings(user.id);
            });
        }
    </script>
</body>
</html>
